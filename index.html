<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container selection-container" id="selection-screen">
        <div class="logo" style="text-align:center;margin-bottom:20px;">
            <span style="font-size:2.5rem;color:#4a90e2;font-weight:bold;">🧠</span>
        </div>
        <h2 style="color:#333;margin-bottom:10px;">Select a Quiz</h2>
        <p style="color:#666;margin-bottom:20px;">Choose a quiz to get started.</p>
        <select id="quiz-select" style="width:100%;padding:10px;font-size:1.1rem;border-radius:6px;border:1px solid #ccc;margin-bottom:20px;background:#f9f9f9;"></select>
        <button class="nav-btn" id="load-quiz-btn" style="width:100%;padding:12px 0;font-size:1.1rem;background-color:#4a90e2;color:#fff;border:none;border-radius:6px;box-shadow:0 2px 8px rgba(74,144,226,0.1);transition:background 0.2s;">Start Quiz</button>
    </div>

    <div class="quiz-container" id="quiz-screen" style="display:none;">
        <div class="header">
            <span id="progress-text">1/3</span>
            <span>Score: <span id="live-score">0</span></span>
        </div>
        
        <div class="question" id="question-text">Loading question...</div>
        
        <div class="choices" id="choices-container">
            </div>

        <div class="explanation" id="explanation-box">
            </div>

        <div class="navigation">
            <button class="nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>Previous</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>
        </div>
    </div>

    <div class="quiz-container results-container" id="results-screen" style="display:none;">
        <h2>Quiz Complete!</h2>
        <p>You scored <strong id="final-score">0</strong> out of <strong id="total-questions">0</strong>.</p>
        <button class="nav-btn" onclick="reviewQuiz()">Review Questions</button>
        <button class="nav-btn" onclick="location.reload()" style="background-color: #6c757d; margin-left: 10px;">Restart Quiz</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
