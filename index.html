<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container" id="quiz-screen">
        <div class="header">
            <span id="progress-text">1/3</span>
            <span>Score: <span id="live-score">0</span></span>
        </div>
        
        <div class="question" id="question-text">Loading question...</div>
        
        <div class="choices" id="choices-container">
            </div>

        <div class="explanation" id="explanation-box">
            </div>

        <div class="navigation">
            <button class="nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>Previous</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>
        </div>
    </div>

    <div class="quiz-container results-container" id="results-screen">
        <h2>Quiz Complete!</h2>
        <p>You scored <strong id="final-score">0</strong> out of <strong id="total-questions">0</strong>.</p>
        <button class="nav-btn" onclick="reviewQuiz()">Review Questions</button>
        <button class="nav-btn" onclick="location.reload()" style="background-color: #6c757d; margin-left: 10px;">Restart Quiz</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
