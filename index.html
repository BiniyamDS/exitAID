<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Quiz App</title>
    <!-- Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Selection Screen -->
    <div class="quiz-container selection-container" id="selection-screen">
        <div class="logo-wrapper">
            <span>🧠</span>
        </div>
        <h2>Select a Quiz</h2>
        <p>Choose a quiz to get started.</p>
        <select id="quiz-select"></select>
        <button class="nav-btn" id="load-quiz-btn">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-container" id="quiz-screen" style="display:none;">
        <div class="header">
            <button class="icon-btn" onclick="returnToHome()" aria-label="Back to Home" title="Back to Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <div class="header-stats">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span id="progress-text">1/3</span>
                    <button class="icon-btn" style="padding: 4px;" id="reset-progress-btn" onclick="resetProgress()"
                        aria-label="Reset Progress" title="Reset Progress">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                            <path d="M3 3v5h5" />
                        </svg>
                    </button>
                </div>
                <span>Score: <span id="live-score">0</span></span>
            </div>
        </div>

        <div class="question" id="question-text">Loading question...</div>

        <div class="choices" id="choices-container">
            <!-- Choices injected via JS -->
        </div>

        <div class="explanation" id="explanation-box">
            <!-- Explanation injected via JS -->
        </div>

        <div class="navigation">
            <button class="nav-btn secondary" id="prev-btn" onclick="prevQuestion()" disabled>Previous</button>
            <button class="nav-btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>
        </div>
    </div>

    <!-- Results Screen -->
    <div class="quiz-container results-container" id="results-screen" style="display:none;">
        <div class="results-icon">🎉</div>
        <h2>Quiz Complete!</h2>
        <p>You scored <strong id="final-score" class="score-highlight">0</strong> out of <strong id="total-questions"
                class="score-highlight">0</strong>.</p>
        <div class="navigation results-nav">
            <button class="nav-btn" onclick="reviewQuiz()">Review Questions</button>
            <button class="nav-btn secondary" onclick="location.reload()">Restart Quiz</button>
            <button class="nav-btn secondary" onclick="returnToHome()">Back to Home</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
